name: unic_tunnel_app
description: Unic-Tunnel Windows desktop client.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true
  # assets/singbox/sing-box.exe is bundled in slice 3c-ii (release build).
  # During 3c-i dev, the binary path is overridden via --dart-define UNIC_SINGBOX_PATH.
